spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/auth/**

        - id: job-service
          uri: http://${JOB_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/jobs/**

        - id: worker-service
          uri: http://${WORKER_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/workers/**

        - id: notification-service
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/notifications/**,/ws/**

        - id: analytics-service
          uri: http://${ANALYTICS_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/analytics/**

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256-bit-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.imageplatform: DEBUG
    org.springframework.cloud.gateway: DEBUG
