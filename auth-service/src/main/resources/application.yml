spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # "validate" = Hibernate checks that entity fields match DB columns on startup.
      # It does NOT create or alter tables — Flyway owns schema changes.
      # Use "create-drop" only in isolated unit tests, never in dev/prod.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    # Flyway runs migrations from src/main/resources/db/migration on startup.
    # Versioned scripts (V1__, V2__) run once. Repeatable scripts (R__) run when changed.
    # The flyway_schema_history table tracks what has already been applied.
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false   # set true only when adding Flyway to an existing DB

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256-bit-key}
  access-token-expiry-ms: 900000      # 15 minutes
  refresh-token-expiry-ms: 604800000  # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.imageplatform: DEBUG
