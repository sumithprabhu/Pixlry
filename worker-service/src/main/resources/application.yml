spring:
  application:
    name: worker-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        # prefetch = how many unacknowledged messages one consumer pulls at a time.
        # Too high: one slow worker hogs messages while others sit idle.
        # Too low: too many round-trips to the broker, reduced throughput.
        # 5 is a reasonable default for CPU-bound image processing.
        prefetch: 5
        acknowledge-mode: auto  # ACK after listener returns; NACK + requeue on exception

server:
  port: 8083

worker:
  # Thread pool size = number of images processed concurrently per worker instance.
  # Rule of thumb for CPU-bound work: num_cores (not num_cores * 2).
  # For I/O-bound work (network, disk): num_cores * 2 or higher.
  # Image processing is CPU-bound, so 4-8 is reasonable on typical dev machines.
  thread-pool-size: ${WORKER_THREAD_POOL_SIZE:4}

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  output-dir: ${FILE_OUTPUT_DIR:./processed}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.imageplatform: DEBUG
